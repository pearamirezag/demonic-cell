<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demonic Cell</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #f5f4f2;
      --fg:     #111111;
      --mid:    #888888;
      --rule:   #c8c7c5;
      --active: #cc2200;
      --font:   'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.25rem 3rem;
    }

    .sheet {
      width: 100%;
      max-width: 540px;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      border-top: 3px solid var(--fg);
      border-bottom: 1px solid var(--fg);
      padding: 0.55rem 0 0.5rem;
      margin-bottom: 0;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 1rem;
    }

    h1 {
      font-size: 1.45rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .subtitle {
      font-size: 0.58rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mid);
      text-align: right;
      line-height: 1.6;
    }

    /* ── VISUALIZERS ─────────────────────────────────────── */
    .vis-grid {
      display: grid;
      grid-template-rows: 90px 70px;
      border-bottom: 1px solid var(--rule);
    }

    .vis-wrap {
      position: relative;
      border-bottom: 1px solid var(--rule);
      overflow: hidden;
    }

    .vis-label {
      position: absolute;
      top: 6px;
      left: 8px;
      font-size: 0.52rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--rule);
      pointer-events: none;
      z-index: 1;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: white;
    }

    /* ── PARAMETERS ──────────────────────────────────────── */
    .params {
      border-bottom: 1px solid var(--fg);
    }

    .param {
      display: grid;
      grid-template-columns: 5.5rem 1fr 4.5rem;
      align-items: center;
      column-gap: 0.75rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--rule);
    }

    .param:last-child { border-bottom: none; }

    .param-name {
      font-size: 0.58rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .param-value {
      font-size: 0.65rem;
      letter-spacing: 0.04em;
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: var(--fg);
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 1px;
      background: var(--rule);
      outline: none;
      cursor: pointer;
    }

    input[type=range].on { background: var(--fg); }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--bg);
      border: 1.5px solid var(--rule);
      cursor: pointer;
      transition: border-color 0.1s, background 0.1s;
    }

    input[type=range].on::-webkit-slider-thumb {
      background: var(--fg);
      border-color: var(--fg);
    }

    input[type=range]::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--bg);
      border: 1.5px solid var(--rule);
      cursor: pointer;
    }

    /* ── BUTTONS ─────────────────────────────────────────── */
    .btn-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1px;
      background: var(--rule);
      border-bottom: 1px solid var(--rule);
    }

    button {
      background: var(--bg);
      border: none;
      color: var(--mid);
      font-family: var(--font);
      font-size: 0.58rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: color 0.1s, background 0.1s;
      text-align: center;
    }

    button:hover { color: var(--fg); }

    #play-btn.on {
      background: var(--fg);
      color: var(--bg);
    }

    #kick-btn:active {
      background: var(--active);
      color: white;
    }

    /* ── SIGNAL CHAIN NOTE ───────────────────────────────── */
    .chain {
      padding: 0.9rem 0 0;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--rule);
      line-height: 2;
    }

    .chain span {
      color: var(--mid);
    }
  </style>
</head>
<body>

<!-- ── WORKLET (not executed — custom script type) ── -->
<script type="lockhart-worklet">
registerProcessor('lockhart-wavefolder', class extends AudioWorkletProcessor {

  static get parameterDescriptors() {
    return [
      { name: 'gain',   defaultValue: 3.0,    minValue: 0.1,   maxValue: 12.0   },
      { name: 'offset', defaultValue: 0.0,    minValue: -4.0,  maxValue:  4.0   },
      { name: 'filter', defaultValue: 5000.0, minValue: 20.0,  maxValue: 20000.0 },
      { name: 'vol',    defaultValue: 0.4,    minValue: 0.0,   maxValue:  1.0   },
    ];
  }

  constructor() {
    super();

    // Lockhart / Serge circuit constants
    const RL = 7.5e3, R = 15e3, VT = 26e-3, Is = 10e-16;
    this.a  = 2 * RL / R;
    this.b  = (R + 2 * RL) / (VT * R);
    this.d  = (RL * Is) / VT;
    this.VT = VT;

    // Six independent ADAA Lockhart cells
    this.cells = Array.from({ length: 6 }, () => ({ Ln1: 0, Fn1: 0, xn1: 0 }));

    this.fbVal = 0.1;   // seed value for self-oscillation
    this.lpY   = 0;     // one-pole LP state
    this.dcx   = 0;     // DC blocker state
    this.dcy   = 0;

    this.port.onmessage = (e) => {
      if (e.data === 'kick')  this.fbVal = 1.0;
      if (e.data === 'reset') { this.fbVal = 0.1; this.lpY = 0; this.dcx = 0; this.dcy = 0; }
    };
  }

  // Lambert W — Halley's method, warm-started from previous iteration
  lambertW(x, w0) {
    let w = Math.abs(w0) > 1e-12 ? w0 : (x > 1.0 ? Math.log(x + 1.0) : x * 0.5);
    for (let i = 0; i < 30; i++) {
      const ew    = Math.exp(Math.min(w, 500));
      const p     = w * ew - x;
      const r     = (w + 1) * ew;
      const denom = r - p * (w + 2) / (2 * (w + 1));
      if (Math.abs(denom) < 1e-30) break;
      const err = p / denom;
      w -= err;
      if (Math.abs(err) < 1e-9) break;
    }
    return w;
  }

  // Single ADAA Lockhart cell
  fold(x, cell) {
    const { a, b, d, VT } = this;
    const l  = x >= 0 ? 1 : -1;
    const u  = d * Math.exp(Math.min(l * b * x, 500));
    const Ln = this.lambertW(u, cell.Ln1);
    const Fn = (0.5 * VT / b) * (Ln * (Ln + 2)) - 0.5 * a * x * x;

    let out;
    if (Math.abs(x - cell.xn1) < 1e-9) {
      const xm = 0.5 * (x + cell.xn1);
      const um = d * Math.exp(Math.min(l * b * xm, 500));
      const Lm = this.lambertW(um, cell.Ln1);
      out = l * VT * Lm - a * xm;
    } else {
      out = (Fn - cell.Fn1) / (x - cell.xn1);
    }

    cell.Ln1 = Ln; cell.Fn1 = Fn; cell.xn1 = x;
    return (isNaN(out) || !isFinite(out)) ? 0.0 : out;
  }

  dcBlock(x) {
    this.dcy = x - this.dcx + 0.9999 * this.dcy;
    this.dcx = x;
    return this.dcy;
  }

  process(inputs, outputs, parameters) {
    const out     = outputs[0][0];
    const gainP   = parameters.gain;
    const offsetP = parameters.offset;
    const filterP = parameters.filter;
    const volP    = parameters.vol;

    // Compute LP coefficient once per buffer (filter param rarely automated)
    const fc = filterP[0];
    const lpA = 1.0 - Math.exp(-2.0 * Math.PI * fc / sampleRate);

    for (let i = 0; i < out.length; i++) {
      const gain   = gainP.length   > 1 ? gainP[i]   : gainP[0];
      const offset = offsetP.length > 1 ? offsetP[i] : offsetP[0];
      const vol    = volP.length    > 1 ? volP[i]    : volP[0];

      // Signal chain: fbVal → ×gain → +offset → ×⅓ → fold×6 → ×3 → tanh → LP → fbVal
      let x = this.fbVal * gain + offset;
      x *= 0.3333;
      x = this.fold(x, this.cells[0]);
      x = this.fold(x, this.cells[1]);
      x = this.fold(x, this.cells[2]);
      x = this.fold(x, this.cells[3]);
      x = this.fold(x, this.cells[4]);
      x = this.fold(x, this.cells[5]);
      x *= 3.0;
      x  = Math.tanh(x);
      // one-pole LP — shapes feedback spectrum before re-injection
      this.lpY += lpA * (x - this.lpY);
      x = this.dcBlock(this.lpY);

      this.fbVal = x;
      out[i] = x * vol;
    }
    return true;
  }
});
</script>

<!-- ── MARKUP ── -->
<div class="sheet">

  <header>
    <h1>Demonic Cell</h1>
    <div class="subtitle">
      Lockhart Wavefolder<br>
      Pedro A. Ramírez
    </div>
  </header>

  <div class="vis-grid">
    <div class="vis-wrap">
      <span class="vis-label">Oscilloscope</span>
      <canvas id="scope" width="1080" height="180"></canvas>
    </div>
    <div class="vis-wrap" style="border-bottom:none;">
      <span class="vis-label">Spectrum</span>
      <canvas id="spectrum" width="1080" height="140"></canvas>
    </div>
  </div>

  <div class="btn-row">
    <button id="play-btn">Play</button>
    <button id="kick-btn">Impulse</button>
  </div>

  <div class="params">
    <div class="param">
      <span class="param-name">Gain</span>
      <input type="range" id="gain" min="0.1" max="12" step="0.05" value="3">
      <span class="param-value" id="gain-val">3.0</span>
    </div>
    <div class="param">
      <span class="param-name">Offset</span>
      <input type="range" id="offset" min="-4" max="4" step="0.02" value="0">
      <span class="param-value" id="offset-val">0.00</span>
    </div>
    <div class="param">
      <span class="param-name">Filter</span>
      <input type="range" id="filter" min="20" max="20000" step="10" value="5000">
      <span class="param-value" id="filter-val">5.0 kHz</span>
    </div>
    <div class="param">
      <span class="param-name">Volume</span>
      <input type="range" id="vol" min="0" max="1" step="0.01" value="0.4">
      <span class="param-value" id="vol-val">0.40</span>
    </div>
  </div>

  <p class="chain">
    Signal chain —
    <span>fb → ×gain → +offset → ×⅓ → fold×6 → ×3 → tanh → LP filter → fb</span>
  </p>

</div>

<!-- ── MAIN SCRIPT ── -->
<script>
  const audioCtx   = new AudioContext();
  const masterGain = audioCtx.createGain();
  masterGain.connect(audioCtx.destination);

  // Analyser for both visualizers
  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  masterGain.connect(analyser);
  window.analyser = analyser; // console access for live tweaking
  const freqData  = new Uint8Array(analyser.frequencyBinCount);
  const timeData  = new Uint8Array(analyser.fftSize);

  let node        = null;
  let isPlaying   = false;
  let initialized = false;
  let animFrame   = null;

  const playBtn = document.getElementById('play-btn');
  const kickBtn = document.getElementById('kick-btn');

  async function init() {
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    const src  = document.querySelector('script[type="lockhart-worklet"]').textContent;
    const blob = new Blob([src], { type: 'application/javascript' });
    await audioCtx.audioWorklet.addModule(URL.createObjectURL(blob));

    node = new AudioWorkletNode(audioCtx, 'lockhart-wavefolder');
    node.connect(masterGain);

    ['gain', 'offset', 'filter', 'vol'].forEach(id => {
      node.parameters.get(id).value = parseFloat(document.getElementById(id).value);
    });

    initialized = true;
  }

  playBtn.addEventListener('click', async () => {
    if (!initialized) await init();

    if (!isPlaying) {
      isPlaying = true;
      playBtn.textContent = 'Stop';
      playBtn.classList.add('on');
      document.querySelectorAll('input[type=range]').forEach(s => s.classList.add('on'));
      drawVis();
    } else {
      isPlaying = false;
      playBtn.textContent = 'Play';
      playBtn.classList.remove('on');
      document.querySelectorAll('input[type=range]').forEach(s => s.classList.remove('on'));
      if (animFrame) cancelAnimationFrame(animFrame);
      node.port.postMessage('reset');
    }
  });

  kickBtn.addEventListener('click', () => { if (node) node.port.postMessage('kick'); });

  // Generic slider binding
  function bindSlider(id, paramName, displayId, fmt) {
    const slider  = document.getElementById(id);
    const display = document.getElementById(displayId);
    slider.addEventListener('input', () => {
      const v = parseFloat(slider.value);
      display.textContent = fmt(v);
      if (node) node.parameters.get(paramName).value = v;
    });
  }

  bindSlider('gain',   'gain',   'gain-val',   v => v.toFixed(1));
  bindSlider('offset', 'offset', 'offset-val', v => v.toFixed(2));
  bindSlider('vol',    'vol',    'vol-val',    v => v.toFixed(2));

  // Filter slider — Hz / kHz display
  document.getElementById('filter').addEventListener('input', function () {
    const v = parseFloat(this.value);
    document.getElementById('filter-val').textContent =
      v >= 1000 ? (v / 1000).toFixed(1) + ' kHz' : Math.round(v) + ' Hz';
    if (node) node.parameters.get('filter').value = v;
  });

  // ── VISUALIZERS ────────────────────────────────────────

  const scopeCanvas   = document.getElementById('scope');
  const specCanvas    = document.getElementById('spectrum');
  const scopeCtx      = scopeCanvas.getContext('2d');
  const specCtx       = specCanvas.getContext('2d');

  const GRID   = '#e8e7e5';
  const LINE   = '#111111';
  const CENTER = '#c8c7c5';
  const BAR    = '#333333';

  function drawScope(W, H) {
    analyser.getByteTimeDomainData(timeData);

    scopeCtx.fillStyle = '#ffffff';
    scopeCtx.fillRect(0, 0, W, H);

    // Grid: center line + horizontal thirds
    scopeCtx.strokeStyle = GRID;
    scopeCtx.lineWidth = 1;
    [H * 0.25, H * 0.5, H * 0.75].forEach(y => {
      scopeCtx.beginPath();
      scopeCtx.moveTo(0, y);
      scopeCtx.lineTo(W, y);
      scopeCtx.stroke();
    });

    // Center line
    scopeCtx.strokeStyle = CENTER;
    scopeCtx.lineWidth = 1;
    scopeCtx.beginPath();
    scopeCtx.moveTo(0, H / 2);
    scopeCtx.lineTo(W, H / 2);
    scopeCtx.stroke();

    // Waveform
    scopeCtx.strokeStyle = LINE;
    scopeCtx.lineWidth = 1.5;
    scopeCtx.beginPath();
    const sliceW = W / timeData.length;
    for (let i = 0; i < timeData.length; i++) {
      const y = ((timeData[i] / 255.0) - 0.5) * H * 0.85 + H / 2;
      i === 0 ? scopeCtx.moveTo(0, y) : scopeCtx.lineTo(i * sliceW, y);
    }
    scopeCtx.stroke();
  }

  function drawSpectrum(W, H) {
    analyser.getByteFrequencyData(freqData);

    specCtx.fillStyle = '#ffffff';
    specCtx.fillRect(0, 0, W, H);

    const bins  = Math.floor(freqData.length * 0.55); // up to ~12 kHz
    const barW  = W / bins;

    for (let i = 0; i < bins; i++) {
      const v = freqData[i] / 255;
      const h = v * v * H;
      specCtx.fillStyle = BAR;
      specCtx.fillRect(i * barW, H - h, barW - 0.5, h);
    }
  }

  function drawVis() {
    if (!isPlaying) return;
    animFrame = requestAnimationFrame(drawVis);
    drawScope(scopeCanvas.width, scopeCanvas.height);
    drawSpectrum(specCanvas.width, specCanvas.height);
  }
</script>

</body>
</html>
